<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="inventoryModals">
    <div class="modal fade" id="newItemModal" tabindex="-1" aria-labelledby="newItemModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <form th:action="@{/inventory/new}" method="post">
                    <div class="modal-header">
                        <h5 class="modal-title" id="newItemModalLabel">Add New Item</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div th:if="${openModal == 'newItemModal' and errorMessage}" class="alert alert-danger" th:text="${errorMessage}">Error</div>

                        <div class="mb-3">
                            <label class="form-label">Title</label>
                            <input type="text" name="title" class="form-control" th:value="${createVariantForm.title}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Category</label>
                            <input type="text" name="category" class="form-control" th:value="${createVariantForm.category}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Size</label>
                            <input type="text" name="size" class="form-control" th:value="${createVariantForm.size}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Color</label>
                            <input type="text" name="color" class="form-control" th:value="${createVariantForm.color}" required>
                        </div>
                        <div class="mb-0">
                            <label class="form-label">Unit Price</label>
                            <input type="number" name="unitPrice" step="0.01" min="0.01" class="form-control" th:value="${createVariantForm.unitPrice}" required>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn">Create Item</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editVariantModal" tabindex="-1" aria-labelledby="editVariantModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="editVariantFormElement" method="post"
                      th:action="${editVariantForm.id != null} ? @{'/inventory/' + ${editVariantForm.id} + '/edit'} : @{/inventory}">
                    <div class="modal-header">
                        <h5 class="modal-title" id="editVariantModalLabel">Update Item</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div th:if="${openModal == 'editVariantModal' and errorMessage}" class="alert alert-danger" th:text="${errorMessage}">Error</div>

                        <input type="hidden" id="editVariantId" th:value="${editVariantForm.id}">

                        <div class="mb-3">
                            <label class="form-label">Title</label>
                            <input type="text" id="editTitle" name="title" class="form-control" th:value="${editVariantForm.title}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Category</label>
                            <input type="text" id="editCategory" name="category" class="form-control" th:value="${editVariantForm.category}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Size</label>
                            <input type="text" id="editSize" name="size" class="form-control" th:value="${editVariantForm.size}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Color</label>
                            <input type="text" id="editColor" name="color" class="form-control" th:value="${editVariantForm.color}" required>
                        </div>
                        <div class="mb-0">
                            <label class="form-label">Unit Price</label>
                            <input type="number" id="editUnitPrice" name="unitPrice" step="0.01" min="0.01" class="form-control" th:value="${editVariantForm.unitPrice}" required>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal fade" id="addStockModal" tabindex="-1" aria-labelledby="addStockModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="addStockFormElement" method="post"
                      th:action="${addStockVariant != null} ? @{'/inventory/' + ${addStockVariant.id} + '/stock/new'} : @{/inventory}">
                    <div class="modal-header">
                        <h5 class="modal-title" id="addStockModalLabel">Add Stock</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div th:if="${openModal == 'addStockModal' and errorMessage}" class="alert alert-danger" th:text="${errorMessage}">Error</div>

                        <div class="mb-3">
                            <label class="form-label">Variant</label>
                            <input type="text" id="stockVariantTitle" class="form-control"
                                   th:value="${addStockVariant != null ? addStockVariant.title + ' - ' + addStockVariant.color + ' (' + addStockVariant.size + ')' : ''}"
                                   readonly>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Location</label>
                            <select name="locationId" class="form-select" required>
                                <option value="">Select location</option>
                                <option th:each="location : ${locations}"
                                        th:value="${location.id}"
                                        th:text="${location.name + ' (' + location.type + ')'}"
                                        th:selected="${selectedLocationId != null and selectedLocationId == location.id}">
                                    Main Warehouse
                                </option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Quantity to Add</label>
                            <input type="number" name="quantity" min="1" class="form-control" th:value="${enteredQuantity}" required>
                        </div>

                        <div class="mb-0">
                            <label class="form-label">Bin Location</label>
                            <select name="binLocation" class="form-select" required>
                                <option value="">Select bin location</option>
                                <option th:each="bin : ${binLocations}"
                                        th:value="${bin}"
                                        th:text="${bin}"
                                        th:selected="${selectedBinLocation == bin}">
                                    A-12-3
                                </option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn">Add Stock</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>

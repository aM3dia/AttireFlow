<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - AttireFlow</title>
    <meta charset="UTF-8"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link th:href="@{/styles.css}" rel="stylesheet"/>
</head>
<body>
    <div class="text-center mt-4">
        <i class="bi bi-clipboard-data-fill fs-2 mb-3"></i>
        <h1>AttireFlow Manager</h1>
        <p>Sign in to access the system</p>
    </div>

    <!-- login form -->
    <div>
        <form class="d-flex flex-column w-25 gap-3 m-auto bg-dark-subtle p-4 rounded">
            <!-- error message -->
            <div th:if="${param.error}" class="error alert-error">
                Invalid username or password
            </div>
            
            <!-- username -->
            <div>
                <label class="fw-bold">Username</label>
                <input type="text" name="username" class="form-control" required>
            </div>

            <!-- password -->
            <div>
                <label class="fw-bold">Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>

            <!-- submit -->
            <div class="text-center">
                <button type="submit" class="btn btn-primary w-100">Sign In</button>
            </div>
        </form>
    </div>
</body>
</html>

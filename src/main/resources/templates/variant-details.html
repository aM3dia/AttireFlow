<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Variant Details - AttireFlow</title>
    <meta charset="UTF-8"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link th:href="@{/inventory-deliveries.css}" rel="stylesheet"/>
    <link th:href="@{/styles.css}" rel="stylesheet"/>
</head>

<body>
    <div th:replace="fragments/navbar :: navbar"></div>

    <div class="main-body"></div>
        <div class="header">
            <div class="back-tab">
                <a href="/inventory"><i class="bi bi-arrow-left-short"></i></a>
                <h1 th:text="${details.variant.title}">Variant</h1>
            </div>
            <div class="top-actions">
                <!-- add stock button -->

                <!-- update button -->
                
                <!-- delete button -->
            </div>
        </div>

        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}">
            Success
        </div>

        <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}">
            Error
        </div>

        <!-- dashboard -->
        <div class="dashboard-grid">
            <div class="card">
                <div class="total-stock">
                    <h3>Total stock:</h3>
                    <p class="number" th:text="${details.totalStock}">0</p>
                </div>
                <div class="icon" style="background-color: rgba(188, 213, 249, 0.5);">
                    <i class="bi bi-box-seam" style="color: blue;"></i>
                </div>
            </div>

            <div class="card">
                <div class="locations">
                    <h3>Locations:</h3>
                    <p class="number" th:text="${details.locationCount}">0</p>
                </div>
                <div class="icon" style="background-color: rgba(240, 209, 244, 0.5);">
                    <i class="bi bi-geo-alt" style="color: blueviolet;"></i>
                </div>
            </div>

            <div class="card">
                <div class="total-value">
                    <h3>Total value:</h3>
                    <p class="number">$<span th:text="${details.totalValue}">0.00</span></p>
                </div>
                <div class="icon" style="background-color: rgba(180, 245, 180, 0.5);">
                    <i class="bi bi-currency-dollar" style="color: rgb(54, 140, 54);"></i>
                </div>
            </div>

            <div class="card">
                <div class="unit-price">
                    <h3>Unit price:</h3>
                    <p class="number">$<span th:text="${details.unitPrice}">0.00</span></p>
                </div>
                <div class="icon" style="background-color: rgba(255, 232, 86, 0.5)">
                    <i class="bi bi-currency-dollar" style="color: rgb(184, 147, 98);"></i>
                </div>
            </div>
        </div>

        <!-- product details -->
        <div class="card" style="flex-direction: column !important;">
            <h2>Product Details</h2>
            <div class="container" style="margin-left: 0px !important; padding-left: 0px !important;">
                <div class="row">
                    <div class="col">
                        <h3>Category</h3>
                        <span class="pill" th:text="${details.variant.category}">Category</span>
                    </div>
                    <div class="col">
                        <h3>Size</h3>
                        <span class="pill" th:text="${details.variant.size}">M</span>
                    </div>
                    <div class="col">
                        <h3>Color</h3>
                        <span class="pill" th:text="${details.variant.color}">Black</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- stock by location -->
        <div class="card" style="margin-top: 20px; flex-direction: column !important">
            <h2 style="padding: 0 !important;">Stock by Location</h2>
            <table class="table" style="margin: 20px 0;">
                <thead>
                    <tr>
                        <th scope="col">Location</th>
                        <th scope="col">Type</th>
                        <th scope="col">Bin location</th>
                        <th scope="col">Quantity</th>
                        <th scope="col">Total value</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="loc : ${details.locations}">
                        <th scope="row" th:text="${loc.locationName}">Main Warehouse</th>
                        <td th:text="${loc.locationType}">Warehouse</td>
                        <td th:text="${loc.binLocation}">A-12-3</td>
                        <td th:text="${loc.quantity}">0</td>
                        <td>$<span th:text="${loc.totalValue}">0.00</span></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>

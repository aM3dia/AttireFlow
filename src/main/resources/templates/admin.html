<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin - AttireFlow</title>
    <meta charset="UTF-8"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link th:href="@{/styles.css}" rel="stylesheet"/>
</head>
<body>
    <!-- nav bar -->
    <div th:replace="fragments/navbar :: navbar"></div>

    <!-- page content -->
    <div class="d-flex flex-row justify-content-between pt-3">
        <div>
            <h1>Administration</h1>
            <p>Manage staff members and their authorizations.</p>
        </div>

        <!-- register staff member -->
        <div>
            <button type="button" class="btn btn-primary w-fit-content">
                <a class="link-underline link-underline-opacity-0 text-white" th:href="@{/registration}">
                    <i class="bi bi-plus-lg"></i>
                    Register Staff
                </a>
            </button>
        </div>
    </div>

    <!-- table of staff members, their role, and authorization level -->
    <div>
        <table class="table table-dark table-striped">
            <thead>
                <tr>
                    <th scope="col">#</th>
                    <th scope="col">First Name</th>
                    <th scope="col">Last Name</th>
                    <th scope="col">Authorization</th>
                    <th scope="col">Account Action</th>
                </tr>
            </thead>
        </table>
        <tbody>
            <tr th:each="user, iterStat : ${users}" th:attr="data-user-id=${user.id}" class="user-row">
                <th scope="row" th:text="${iterStat.count}">1</th>
                
                <!-- first name -->
                <td class="display-mode">
                    <span class="display-mode first-name-display" th:text="${user.firstName}">John</span>
                    <input type="text" class="form-control form-control-sm edit-mode edit-first-name" th:value="${user.firstName}" style="display: none;">
                </td>
                
                <!-- last name -->
                <td class="display-mode">
                    <span class="display-mode last-name-display" th:text="${user.lastName}">Doe</span>
                    <input type="text" class="form-control form-control-sm edit-mode edit-last-name" th:value="${user.lastName}" style="display: none;">
                </td>
                
                <!-- role/authorization -->
                <td class="display-mode">
                    <span class="display-mode role-display" th:text="${user.role}">Admin</span>
                    <select class="form-select form-select-sm edit-mode edit-role" style="display: none;">
                        <option value="ADMIN" th:selected="${user.role == 'ADMIN'}">Admin</option>
                        <option value="INVENTORY_STAFF" th:selected="${user.role == 'INVENTORY_STAFF'}">Inventory Staff</option>
                        <option value="DELIVERY_STAFF" th:selected="${user.role == 'DELIVERY_STAFF'}">Delivery Staff</option>
                    </select>
                </td>
                
                <!-- actions -->
                <td>
                    <!-- display mode -->
                    <div class="display-mode">
                        <button class="btn btn-sm btn-primary edit-btn">Edit</button>
                        <button class="btn btn-sm btn-danger delete-btn" th:attr="data-user-id=${user.id}">Delete</button>
                    </div>
                    <!-- edit mode -->
                    <div class="edit-mode" style="display: none;">
                        <button class="btn btn-sm btn-success update-btn" th:attr="data-user-id=${user.id}">Update</button>
                        <button class="btn btn-sm btn-secondary cancel-btn">Cancel</button>
                    </div>
                </td>
            </tr>
        </tbody>
    </div>

    <!-- script for updating information -->
    <script th:inline="javascript">
        document.addEventListener('DOMContentLoaded', function() {
            // Edit button click
            document.querySelectorAll('.edit-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const row = this.closest('tr');
                    row.querySelectorAll('.display-mode').forEach(el => el.style.display = 'none');
                    row.querySelectorAll('.edit-mode').forEach(el => el.style.display = 'table-cell');
                });
            });
            
            // Cancel button click
            document.querySelectorAll('.cancel-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const row = this.closest('tr');
                    row.querySelectorAll('.display-mode').forEach(el => el.style.display = 'table-cell');
                    row.querySelectorAll('.edit-mode').forEach(el => el.style.display = 'none');
                });
            });
            
            // Update button click
            document.querySelectorAll('.update-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const row = this.closest('tr');
                    const userId = this.getAttribute('data-user-id');
                    const firstName = row.querySelector('.edit-first-name').value;
                    const lastName = row.querySelector('.edit-last-name').value;
                    const role = row.querySelector('.edit-role').value;
                    
                    // Update the display values
                    row.querySelector('.first-name-display').textContent = firstName;
                    row.querySelector('.last-name-display').textContent = lastName;
                    row.querySelector('.role-display').textContent = role;
                    
                    // Send update to server
                    fetch('/admin/users/' + userId + '/update', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/x-www-form-urlencoded',
                        },
                        body: 'firstName=' + encodeURIComponent(firstName) + 
                            '&lastName=' + encodeURIComponent(lastName) +
                            '&role=' + encodeURIComponent(role)
                    })
                    .then(response => {
                        if (response.ok) {
                            // Switch back to display mode
                            row.querySelectorAll('.display-mode').forEach(el => el.style.display = 'table-cell');
                            row.querySelectorAll('.edit-mode').forEach(el => el.style.display = 'none');
                        }
                    });
                });
            });
            
            // Delete button click
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    if (confirm('Are you sure you want to delete this user?')) {
                        const userId = this.getAttribute('data-user-id');
                        fetch('/admin/users/' + userId + '/delete', {
                            method: 'POST'
                        }).then(() => {
                            this.closest('tr').remove();
                        });
                    }
                });
            });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin - AttireFlow</title>
    <meta charset="UTF-8"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link th:href="@{/styles.css}" rel="stylesheet"/>
</head>
<body>
    <!-- nav bar -->
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <!-- page content -->
    <div class="d-flex flex-row justify-content-between pt-3">
        <div>
            <h1>Administration</h1>
            <p>Manage staff members and their authorizations.</p>
        </div>

        <!-- register staff member -->
        <div>
            <button type="button" class="btn btn-primary w-fit-content">
                <a class="link-underline link-underline-opacity-0 text-white" th:href="@{/registration}">
                    <i class="bi bi-plus-lg"></i>
                    Register Staff
                </a>
            </button>
        </div>
    </div>

    <div class="container mt-3">
        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    </div>

    <div>
        <table class="table align-middle">
            <thead>
                <tr class="table table-dark table-striped">
                    <th scope="col">#</th>
                    <th scope="col">Username</th>
                    <th scope="col">Authorization</th>
                    <th scope="col">Account Action</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="user, iterStat : ${users}" th:attr="data-user-id=${user.id}" class="user-row">
                    <th scope="row" th:text="${iterStat.count}">1</th>

                    <td>
                        <span class="username-display" th:text="${user.username}">admin</span>
                        <input type="text" class="form-control form-control-sm edit-username mt-1 d-none" style="width: 50% !important;"
                               th:value="${user.username}">
                    </td>

                    <!-- authorization level -->
                    <td>
                        <span class="role-display" th:text="${user.role.displayName}">Admin</span>

                        <select class="form-select form-select-sm edit-role d-none" style="width: 50% !important;"
                                th:if="${user.role.name() != 'ADMIN' or adminCount > 1}">
                            <option value="ADMIN" th:selected="${user.role.name() == 'ADMIN'}">Admin</option>
                            <option value="INVENTORY_MANAGER" th:selected="${user.role.name() == 'INVENTORY_MANAGER'}">Inventory Manager</option>
                            <option value="DELIVERY_MANAGER" th:selected="${user.role.name() == 'DELIVERY_MANAGER'}">Delivery Manager</option>
                        </select>
                    </td>

                    <td>
                        <!-- display actions -->
                        <div class="display-actions d-flex gap-2 flex-wrap">
                            <button class="btn btn-sm btn-primary edit-btn" type="button">Edit</button>
                            <button class="btn btn-sm btn-danger delete-btn"
                                    type="button"
                                    th:attr="data-user-id=${user.id}"
                                    th:if="${user.username != currentUserLabel}">
                                Delete
                            </button>
                            <span class="text-muted small align-self-center" th:if="${user.username == currentUserLabel}">
            Current account
        </span>
                        </div>

                        <!-- edit actions -->
                        <div class="edit-actions d-flex gap-2 flex-wrap d-none">
                            <button class="btn btn-sm btn-success update-btn" type="button" th:attr="data-user-id=${user.id}">Update</button>
                            <button class="btn btn-sm btn-secondary cancel-btn" type="button">Cancel</button>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <script th:inline="javascript">
        document.addEventListener('DOMContentLoaded', function() {
          function setEditMode(row, editing) {
                row.querySelector('.username-display').classList.toggle('d-none', editing);
                row.querySelector('.role-display').classList.toggle('d-none', editing);
                row.querySelector('.edit-username').classList.toggle('d-none', !editing);

                const editRole = row.querySelector('.edit-role');
                if (editRole) {
                    editRole.classList.toggle('d-none', !editing);
                }

                row.querySelector('.display-actions').classList.toggle('d-none', editing);
                row.querySelector('.edit-actions').classList.toggle('d-none', !editing);
            }

            document.querySelectorAll('.edit-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    setEditMode(this.closest('tr'), true);
                });
            });

            document.querySelectorAll('.cancel-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    setEditMode(this.closest('tr'), false);
                });
            });

            document.querySelectorAll('.update-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const row = this.closest('tr');
                    const userId = this.getAttribute('data-user-id');
                    const username = row.querySelector('.edit-username').value;
                    const role = row.querySelector('.edit-role') ? row.querySelector('.edit-role').value : null;

                    fetch('/admin/users/' + userId + '/update', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/x-www-form-urlencoded',
                        },
                        body: 'username=' + encodeURIComponent(username) +
                            (role ? '&role=' + encodeURIComponent(role) : '')
                    }).then(response => {
                        if (response.ok) {
                            row.querySelector('.username-display').textContent = username;
                            if (row.querySelector('.edit-role')) {
                                row.querySelector('.role-display').textContent = row.querySelector('.edit-role').selectedOptions[0].text;
                            }
                            setEditMode(row, false);
                            window.location.reload();
                        }
                    });
                });
            });

            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    if (confirm('Are you sure you want to delete this user?')) {
                        const userId = this.getAttribute('data-user-id');
                        fetch('/admin/users/' + userId + '/delete', {
                            method: 'POST'
                        }).then(() => {
                            this.closest('tr').remove();
                        });
                    }
                });
            });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard - AttireFlow</title>
    <meta charset="UTF-8"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link th:href="@{/styles.css}" rel="stylesheet"/>
</head>

<body>
    <div th:replace="fragments/navbar :: navbar"></div>

    <div class="main-body">
        <div class="header">
            <div class="intro">
                <h1>Dashboard</h1>
                <p class="muted">Welcome back! Here's your inventory overview.</p>
            </div>
        </div>
        
        <div class="dashboard-grid">
            <div class="card">
                <div class="dash-stats">
                    <h3>Total Products</h3>
                    <p class="number" th:text="${totalProducts}">0</p>
                </div>
                <div class="icon" style="background-color: rgba(188, 213, 249, 0.4);">
                    <i class="bi bi-box-seam" style="color: blue;"></i>
                </div>
            </div>
            
            <div class="card">
                <div class="dash-stats" >
                    <h3>Low Stock Items</h3>
                    <p class="number" th:text="${lowStockCount}">0</p>
                </div>
                <div class="icon" style="background-color: rgba(255, 0, 0, 0.2);">
                    <i class="bi bi-exclamation-circle" style="color: red;"></i>
                </div>
            </div>
            
            <div class="card">
                <div class="dash-stats">
                    <h3>Pending Deliveries</h3>
                    <p class="number" th:text="${pendingDeliveries}">0</p>
                </div>
                <div class="icon" style="background-color: rgba(255, 165, 0, 0.2);">
                    <i class="bi bi-truck" style="color: orange;"></i>
                </div>
            </div>
            
            <div class="card">
                <div class="dash-stats">
                    <h3>Total Warehouses</h3>
                    <p class="number" th:text="${totalWarehouses}">0</p>
                </div>
                <div class="icon" style="background-color: rgba(0, 128, 0, 0.2);">
                    <i class="bi bi-map" style="color: green;"></i>
                </div>
            </div>
        </div>

        <div class="row" style="margin: 0; gap: 20px;">
            <!-- Low Stock Dashboard -->
            <div class="stock-alerts card col" style="flex-direction: column;">
                <div class="intro">
                    <h2 style="padding-bottom: 0;">Low Stock Alerts</h2>
                </div>

                <div class="intro dash-info" th:each="item : ${lowStockItems}" style="border-top: 2px solid #ddd; padding-top: 20px; margin-top: 20px;">
                    <div class="info-header stock-header" style="display: flex; justify-content: space-between;">
                        <h2 th:text="${item.variant.title}" style="padding: 0; font-size: 1.1em;">T-Shirt</h2>
                        <div class="status">
                            <span class="badge badge-warning">Low Stock</span>
                        </div>
                    </div>
                    <div class="details stock-details row">
                        <span th:each="entry : ${item.stockByLocation}">Main Warehouse</span>
                        <div class="col">
                            <span>Qty: <span th:text="${item.totalStock}">0</span></span>
                        </div>
                        <div class="col">
                            <span>Size: <span th:text="${item.variant.size}">M</span></span>
                        </div>
                        <div class="col">
                            <span>Color: <span th:text="${item.variant.color}">Black</span></span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Recent Deliveries -->
            <div class="recent-deliveries card col" style="flex-direction: column;">
                <div class="intro">
                    <h2 style="padding-bottom: 0;">Recent Deliveries</h2>
                </div>
                <div class="intro dash-info" th:each="delivery : ${recentDeliveries}" style="border-top: 2px solid #ddd; padding-top: 20px; margin-top: 20px;">
                    <div class="info-header delivery-header" style="display: flex; justify-content: space-between;">
                        <h2 th:text="${delivery.location} + ' - ' + ${delivery.deliveryType} + ' ' + 'Delivery'" style="padding: 0; font-size: 1.1em;">Toronto - Express</h2>
                        <div class="status">
                            <span class="badge badge-success" th:text="${delivery.status} + ' ' + ${delivery.deliveryDate}">Delivered</span>
                        </div>
                    </div>
                    <div class="details delivery-details row">
                        <span th:text="${delivery.variant != null ? delivery.variant.title : 'Unknown item'}">T-Shirt</span>
                        <span th:text="${delivery.quantity + ' ' + (delivery.quantity == 1 ? 'unit' : 'units')}">10 units</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

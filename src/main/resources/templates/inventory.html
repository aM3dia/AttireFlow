<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Inventory - AttireFlow</title>
    <meta charset="UTF-8"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link th:href="@{/inventory-deliveries.css}" rel="stylesheet"/>
    <link th:href="@{/styles.css}" rel="stylesheet"/>

    <style>
        table {
            border-collapse: collapse; 
            width: 100%; 
            margin: 20px 0; 
        }
            
        th {
            background: #f5f5f5; 
        }

        th, td { 
            border: 1px solid #ddd; 
            padding: 10px;
            text-align: left; 
            vertical-align: top;
        }
    </style>
</head>

<body>
    <div th:replace="fragments/navbar :: navbar"></div>

    <div class="main-body">
        <div class="header">
            <div class="intro">
                <h1>Inventory</h1>
                <p class="muted">Showing variants with total stock and stock by location.</p>
            </div>
            <div class="top-actions">
                <button type="button" class="btn" data-bs-toggle="modal" data-bs-target="#newItemModal"><i class="bi bi-plus-lg" style="margin-right: 5px"></i>Add New Item</button>
            </div>
        </div>

        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}">Success</div>
<div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}">Error</div>

        <div class="card" style="margin: 20px 0;">
            <form method="get" th:action="@{/inventory}">
                <input type="hidden" name="page" value="0" />
                <input type="hidden" name="sort" th:value="${currentSort}" />
                <div class="filter-row">
                    <div class="filter-item">
                        <label>Variant Title</label>
                        <input type="text" name="title" th:value="${selectedTitle}" placeholder="Search title">
                    </div>
                    <div class="filter-item">
                        <label>Size</label>
                        <select name="size">
                            <option value="">All</option>
                            <option th:each="sizeOption : ${sizes}"
                                    th:value="${sizeOption}"
                                    th:text="${sizeOption}"
                                    th:selected="${selectedSize == sizeOption}">M</option>
                        </select>
                    </div>
                    <div class="filter-item">
                        <label>Color</label>
                        <select name="color">
                            <option value="">All</option>
                            <option th:each="colorOption : ${colors}"
                                    th:value="${colorOption}"
                                    th:text="${colorOption}"
                                    th:selected="${selectedColor == colorOption}">Black</option>
                        </select>
                    </div>
                    <div class="filter-item">
                        <label>Category</label>
                        <select name="category">
                            <option value="">All</option>
                            <option th:each="categoryOption : ${categories}"
                                    th:value="${categoryOption}"
                                    th:text="${categoryOption}"
                                    th:selected="${selectedCategory == categoryOption}">Tops</option>
                        </select>
                    </div>
                    <div class="filter-item">
                        <label>Rows per page</label>
                        <select name="pageSize">
                            <option value="5" th:selected="${pageSize == 5}">5</option>
                            <option value="10" th:selected="${pageSize == 10}">10</option>
                            <option value="20" th:selected="${pageSize == 20}">20</option>
                        </select>
                    </div>
                    <div class="filter-item">
                        <button type="submit" class="btn">Filter</button>
                    </div>
                    <div class="filter-item">
                        <a th:href="@{/inventory}" class="btn btn-secondary">Clear</a>
                    </div>
                </div>
            </form>
        </div>

        <!-- content -->

        <div class="row row-cols-3" style="gap: 20px 0;">
            <div class="col" th:each="row : ${inventoryPage.content}">
                <div class="card h-100 g-4" style="flex-direction: column !important;">
                    <div class="title" style="display: flex; flex-direction: row;">
                        <div class="variant-title">
                            <h2 th:text="${row.variant.title}">Variant</h2>
                        </div>
                        <div class="icon" style="background-color: rgba(188, 213, 249, 0.4); font-size: 1.5em;">
                            <i class="bi bi-box-seam" style="color: blue;"></i>
                        </div>
                    </div>

                    <div class="row row-cols-2" style="border-bottom: 1px solid lightgray; padding: 20px 0; gap: 10px 0; margin: 20px 0;">
                        <div class="category details">
                            <span class="field">Category</span>
                            <span th:text="${row.variant.category}" class="item-dets">T-shirt</span>
                        </div>

                        <div class="size-color details">
                            <span class="field">Size/Color</span>
                            <span th:text="${row.variant.size + '/' + row.variant.color}" class="item-dets">M/Black</span>
                        </div>

                        <div class="stock details">
                            <span class="field">Total Stock</span>
                            <span th:text="${row.totalStock}" class="item-dets">1234</span>
                        </div>

                        <div class="locations details">
                            <span class="field">Locations</span>
                            <span th:text="${row.locationCount}" class="item-dets">3</span>
                        </div>
                    </div>

                    <div class="by-location">
                        <span>Stock by Location:</span>
                        <ul th:if="${!#maps.isEmpty(row.stockByLocation)}" style="list-style: none; padding: 0;">
                            <li th:each="entry : ${row.stockByLocation}" style="margin: 10px 0;">
                                <span th:text="${entry.key}">Location</span>: 
                                <span style="font-weight: bold;" th:text="${entry.value + ' ' + (entry.value == 1 ? 'unit' : 'units')}">0 units</span>
                            </li>
                        </ul>
                    </div>

                    <!-- action buttons -->
                    <div class="row row-cols-2 g-2">
                        <div class="col">
                            <form th:action="@{'/inventory/' + ${row.variant.id}}" method="get">
                                <button type="submit" class="btn w-100">View Details</button>
                            </form>
                        </div>

                        <div class="col">
                            <button type="button"
                                    class="btn add-btn open-add-stock-modal w-100"
                                    data-bs-toggle="modal"
                                    data-bs-target="#addStockModal"
                                    th:attr="data-variant-id=${row.variant.id},
                                            data-variant-title=${row.variant.title},
                                            data-variant-color=${row.variant.color},
                                            data-variant-size=${row.variant.size}">
                                Add Stock
                            </button>
                        </div>

                        <div class="col">
                            <button type="button"
                                    class="btn btn-secondary open-edit-variant-modal w-100"
                                    data-bs-toggle="modal"
                                    data-bs-target="#editVariantModal"
                                    th:attr="data-variant-id=${row.variant.id},
                                            data-title=${row.variant.title},
                                            data-category=${row.variant.category},
                                            data-size=${row.variant.size},
                                            data-color=${row.variant.color},
                                            data-unit-price=${row.variant.unitPrice}">
                                Update
                            </button>
                        </div>

                        <div class="col">
                            <form th:action="@{'/inventory/' + ${row.variant.id} + '/delete'}" method="post">
                                <button type="submit" class="btn delete-btn w-100" style="width: 100%;">Delete</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="pagination" th:if="${inventoryPage.totalPages > 1}">
            <a th:if="${inventoryPage.hasPrevious()}"
            th:href="@{/inventory(page=0, pageSize=${pageSize}, sort=${currentSort}, title=${selectedTitle}, size=${selectedSize}, color=${selectedColor}, category=${selectedCategory})}">« First</a>
            <a th:if="${inventoryPage.hasPrevious()}"
            th:href="@{/inventory(page=${inventoryPage.number - 1}, pageSize=${pageSize}, sort=${currentSort}, title=${selectedTitle}, size=${selectedSize}, color=${selectedColor}, category=${selectedCategory})}">‹ Previous</a>
            <span th:text="'Page ' + (${inventoryPage.number} + 1) + ' of ' + ${inventoryPage.totalPages}"></span>
            <a th:if="${inventoryPage.hasNext()}"
            th:href="@{/inventory(page=${inventoryPage.number + 1}, pageSize=${pageSize}, sort=${currentSort}, title=${selectedTitle}, size=${selectedSize}, color=${selectedColor}, category=${selectedCategory})}">Next ›</a>
            <a th:if="${inventoryPage.hasNext()}"
            th:href="@{/inventory(page=${inventoryPage.totalPages - 1}, pageSize=${pageSize}, sort=${currentSort}, title=${selectedTitle}, size=${selectedSize}, color=${selectedColor}, category=${selectedCategory})}">Last »</a>
        </div>
    </div>
    
    <!-- Modals -->
    <div th:replace="~{fragments/inventory-modals :: inventoryModals}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:inline="javascript">
        document.addEventListener('DOMContentLoaded', function () {
            const editForm = document.getElementById('editVariantFormElement');
            const addStockForm = document.getElementById('addStockFormElement');

            document.querySelectorAll('.open-edit-variant-modal').forEach(button => {
                button.addEventListener('click', function () {
                    const id = this.dataset.variantId;
                    document.getElementById('editVariantId').value = id;
                    document.getElementById('editTitle').value = this.dataset.title;
                    document.getElementById('editCategory').value = this.dataset.category;
                    document.getElementById('editSize').value = this.dataset.size;
                    document.getElementById('editColor').value = this.dataset.color;
                    document.getElementById('editUnitPrice').value = this.dataset.unitPrice;
                    editForm.action = '/inventory/' + id + '/edit';
                });
            });

            document.querySelectorAll('.open-add-stock-modal').forEach(button => {
                button.addEventListener('click', function () {
                    const id = this.dataset.variantId;
                    document.getElementById('stockVariantTitle').value =
                        this.dataset.variantTitle + ' - ' + this.dataset.variantColor + ' (' + this.dataset.variantSize + ')';
                    addStockForm.action = '/inventory/' + id + '/stock/new';
                });
            });

            const openModal = /*[[${openModal}]]*/ '';
            if (openModal) {
                const modalElement = document.getElementById(openModal);
                if (modalElement) {
                    const modal = new bootstrap.Modal(modalElement);
                    modal.show();
                }
            }
        });
    </script>
</body>
</html>
